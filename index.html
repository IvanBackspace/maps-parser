<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Google Maps Parser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <section class="parser">
        <header class="header">
            <div>
                <p>Parser</p>
            </div>
        </header>
        <div class="container">

            <div>
                <h1>Google Maps Parser</h1>
                <label for="query">Поисковые запросы (каждый с новой строки или через запятую, запускать без
                    vpn! Максимальное число запросов за один раз 30шт):</label><br>
                <textarea id="query" rows="5"
                    cols="50">Вывод из запоя, Наркологическая клиника, Лечение алкоголизма</textarea>
                <br>
            </div>
            <div class="parser__buttons">
                <button id="runButton" onclick="runParser()">
                    <p class="parser__button-text">Запустить парсер</p> <span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-caret-right-fill" viewBox="0 0 16 16">
                            <path
                                d="m12.14 8.753-5.482 4.796c-.646.566-1.658.106-1.658-.753V3.204a1 1 0 0 1 1.659-.753l5.48 4.796a1 1 0 0 1 0 1.506z" />
                        </svg>
                    </span>
                </button>
            </div>
            <div id="status"></div>
            <h2 class="parser__active-count">Активные сессии (<span id="activeCount">0</span>/5)</h2>
            <div id="sessions"></div>
        </div>
    </section>
    <script src="assets/js/main.js"></script>
</body>

</html>
