<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Google Maps Parser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <style>
        @charset "UTF-8";

        /* Reset and base styles  */
        * {
            padding: 0px;
            margin: 0px;
            border: none;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        /* Links */
        a,
        a:link,
        a:visited {
            text-decoration: none;
        }

        a:hover {
            text-decoration: none;
        }

        /* Common */
        aside,
        nav,
        footer,
        header,
        section,
        main {
            display: block;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        p {
            font-size: inherit;
            font-weight: inherit;
        }

        ul,
        ul li {
            list-style: none;
        }

        img {
            vertical-align: top;
        }

        img,
        svg {
            max-width: 100%;
            height: auto;
        }

        address {
            font-style: normal;
        }

        /* Form */
        input,
        textarea,
        button,
        select {
            font-family: inherit;
            font-size: inherit;
            color: inherit;
            background-color: transparent;
        }

        input::-ms-clear {
            display: none;
        }

        button,
        input[type=submit] {
            display: inline-block;
            box-shadow: none;
            background-color: transparent;
            background: none;
            cursor: pointer;
        }

        input:focus,
        input:active,
        button:focus,
        button:active {
            outline: none;
        }

        button::-moz-focus-inner {
            padding: 0;
            border: 0;
        }

        label {
            cursor: pointer;
        }

        legend {
            display: block;
        }

        html {
            line-height: 1.15;
            -webkit-text-size-adjust: 100%;
        }

        main {
            display: block;
        }

        hr {
            box-sizing: content-box;
            height: 0;
            overflow: visible;
        }

        pre {
            font-family: monospace, monospace;
            font-size: 1em;
        }

        a {
            background-color: transparent;
        }

        abbr[title] {
            border-bottom: none;
            text-decoration: underline;
            -webkit-text-decoration: underline dotted;
            text-decoration: underline dotted;
        }

        b,
        strong {
            font-weight: 600;
        }

        code,
        kbd,
        samp {
            font-family: monospace, monospace;
            font-size: 1em;
        }

        small {
            font-size: 80%;
        }

        sub,
        sup {
            font-size: 75%;
            line-height: 0;
            position: relative;
            vertical-align: baseline;
        }

        sub {
            bottom: -0.25em;
        }

        sup {
            top: -0.5em;
        }

        img {
            border-style: none;
            display: block;
        }

        button,
        input,
        optgroup,
        select,
        textarea {
            font-family: inherit;
            font-size: 100%;
            line-height: 1.15;
            margin: 0;
        }

        button,
        input {
            overflow: visible;
        }

        button,
        select {
            text-transform: none;
        }

        button,
        [type=button],
        [type=reset],
        [type=submit] {
            -webkit-appearance: button;
        }

        button::-moz-focus-inner,
        [type=button]::-moz-focus-inner,
        [type=reset]::-moz-focus-inner,
        [type=submit]::-moz-focus-inner {
            border-style: none;
            padding: 0;
        }

        button:-moz-focusring,
        [type=button]:-moz-focusring,
        [type=reset]:-moz-focusring,
        [type=submit]:-moz-focusring {
            outline: 1px dotted ButtonText;
        }

        fieldset {
            padding: 0.35em 0.75em 0.625em;
        }

        legend {
            box-sizing: border-box;
            color: inherit;
            display: table;
            max-width: 100%;
            padding: 0;
            white-space: normal;
        }

        progress {
            vertical-align: baseline;
        }

        textarea {
            overflow: auto;
        }

        [type=checkbox],
        [type=radio] {
            box-sizing: border-box;
            padding: 0;
        }

        [type=number]::-webkit-inner-spin-button,
        [type=number]::-webkit-outer-spin-button {
            height: auto;
        }

        [type=search] {
            -webkit-appearance: textfield;
            outline-offset: -2px;
        }

        [type=search]::-webkit-search-decoration {
            -webkit-appearance: none;
        }

        ::-webkit-file-upload-button {
            -webkit-appearance: button;
            font: inherit;
        }

        details {
            display: block;
        }

        summary {
            display: list-item;
        }

        template {
            display: none;
        }

        [hidden] {
            display: none;
        }

        :root {
            --container-width: 1760px;
            --container-width-section: 1920px;
            --container-padding: 20px;
        }

        /* Общие glob */
        html.lock {
            overflow: hidden;
        }

        html.burger-lock {
            overflow: hidden;
        }

        html::before {
            display: block;
            content: "";
            width: 100%;
            height: 100%;
            background: var(--white);
            position: fixed;
            inset: 0;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.3s linear;
        }

        .no-scroll {
            overflow: hidden;
        }

        body.lock {
            overflow: hidden;
        }

        body.burger-lock {
            overflow: hidden;
        }

        * {
            font-style: normal;
        }

        body {
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 0;
            background: #f5f5f7;

            font-size: 18px;
            line-height: 1.2;
            font-weight: 500;
            font-style: normal;
            font-family: "Nunito", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }

        .container {
            margin: 0 auto;
            padding: 0 20px;
            max-width: 1024px;
            width: 100%;
        }

        h1 {
            display: inline-block;
            font-size: 80px;
            font-weight: 600;
            letter-spacing: -.015em;
            line-height: 1.05;
            width: 100%;
            margin-bottom: 30px;
        }

        textarea#query {
            box-shadow: 2px 4px 12px #00000014;
            margin-bottom: 20px;
            padding: 20px;
            border: none;
            background: white;
            border-radius: 20px;
            width: 100%;
        }

        label {
            font-size: 24px;
            margin-bottom: 10px;
            display: block;
        }

        #runButton {
            appearance: none;
            cursor: pointer;
            outline-offset: .25rem;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: .625rem 1.0625rem;
            text-decoration: none;
            color: white;
            background-color: #0071e3;
            gap: 9px;
            text-align: center;
            text-wrap: balance;
            font-size: 21px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            transition: .2s cubic-bezier(.33, 1, .68, 1);
            transition-property: background-color, border-color;
            justify-content: center;
        }

        #runButton span {
            display: inline-block;
        }

        #runButton span svg {
            transition: transform 0.3s ease;
            display: block;
            padding-top: 1px;
        }

        #runButton:hover span svg {
            transform: translateX(5px);
            /* Иконка поедет вправо */
            /* Или rotate(10deg) для поворота */
        }

        .parser__buttons {
            display: flex;
            justify-content: end;
        }

        #query:focus {
            outline: none;
            border: none;
        }


        #sessions button {
            background: var(--sys-surface-container-low);
            border: 2px solid transparent;
            border-radius: 24px;
            display: block;
            text-decoration: none;
            height: 100%;
            -moz-box-sizing: border-box;
            box-sizing: border-box;
            padding: 9px 24px;
            background-color: #16c60c;
            display: flex;
            color: white;
            gap: 10px;
            align-items: center;
        }

        #sessions ul li {
            width: 100%;
            max-width: 100%;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        svg.bi.bi-download {
            width: 25px;
        }


        svg[viewBox="0 0 16 16"] path:last-child {
            transition: transform 0.3s;
        }


        button.parser__button-save:hover svg[viewBox="0 0 16 16"] path:last-child {
            transform: translateY(2px);
        }

        .parser__svg-running {
            width: 30px;
        }
    </style>
</head>

<body>
    <section class="parser">
        <div class="container">
            <h1>Google Maps Parser</h1>
            <div>
                <label for="query">Поисковые запросы (каждый с новой строки или через запятую):</label><br>
                <textarea id="query" rows="5"
                    cols="50">Вывод из запоя, Наркологическая клиника, Лечение алкоголизма</textarea>
                <br>
            </div>
            <div class="parser__buttons">
                <button id="runButton" onclick="runParser()">
                    <p class="parser__button-text">Запустить парсер</p> <span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-caret-right-fill" viewBox="0 0 16 16">
                            <path
                                d="m12.14 8.753-5.482 4.796c-.646.566-1.658.106-1.658-.753V3.204a1 1 0 0 1 1.659-.753l5.48 4.796a1 1 0 0 1 0 1.506z" />
                        </svg>
                    </span>
                </button>
            </div>
            <div id="status"></div>
            <h2 class="parser__active-count">Активные сессии (<span id="activeCount">0</span>/5)</h2>
            <div id="sessions"></div>
        </div>
    </section>
    <script>
        let currentSessionId = null;
        const MAX_SESSIONS = 5;

        function parseQueries(input) {
            // Разделяем по запятым или переносам строк
            let queries = input.split(/[,\n]/)
                .map(q => q.trim())
                .filter(q => q.length > 0);

            return queries;
        }

        async function checkActiveSessions() {
            try {
                const response = await fetch('/sessions');
                const sessions = await response.json();
                const activeCount = sessions.filter(s => s.status === 'running').length;

                document.getElementById('activeCount').textContent = activeCount;

                const runButton = document.getElementById('runButton');
                const buttonText = document.querySelector('.parser__button-text');

                if (activeCount >= MAX_SESSIONS) {
                    runButton.disabled = true;
                    buttonText.textContent = 'Достигнут лимит сессий (5)';
                } else {
                    runButton.disabled = false;
                    buttonText.textContent = 'Запустить парсер';
                }

                return activeCount;
            } catch (error) {
                console.error('Ошибка проверки сессий:', error);
                return 0;
            }
        }

        async function runParser() {
            // Проверяем количество активных сессий перед запуском
            const activeCount = await checkActiveSessions();

            if (activeCount >= MAX_SESSIONS) {
                alert(`Достигнут лимит одновременных сессий (${MAX_SESSIONS}). Дождитесь завершения текущих.`);
                return;
            }

            const queryInput = document.getElementById('query').value;
            const queries = parseQueries(queryInput);

            if (queries.length === 0) {
                alert('Введите хотя бы один запрос');
                return;
            }

            const status = document.getElementById('status');

            // Объединяем все запросы в одну строку с разделителем
            const combinedQuery = queries.join('|||');

            status.innerHTML = `Запуск парсера с ${queries.length} запросами...`;

            try {
                const response = await fetch('/run', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: combinedQuery })
                });

                const result = await response.json();

                if (result.success) {
                    currentSessionId = result.sessionId;
                    status.innerHTML = `✅ Парсер запущен! ID сессии: ${result.sessionId}<br>Запросы: ${queries.join(', ')}`;
                    // Открываем новое окно с этим же приложением
                    window.open('/', '_blank');
                    // Обновляем список сессий
                    loadSessions();
                    // Обновляем счетчик активных сессий
                    await checkActiveSessions();
                } else {
                    status.innerHTML = 'Ошибка: ' + result.message;
                }

                console.log(result);
            } catch (error) {
                status.innerHTML = 'Ошибка: ' + error.message;
            }
        }

        async function loadSessions() {
            try {
                const response = await fetch('/sessions');
                const sessions = await response.json();

                let html = '<ul>';
                sessions.forEach(session => {
                    const statusClass = session.status === 'completed' ? '<svg class="parser__svg-running" enable-background="new 0 0 24 24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="m18 24h-12c-3.3 0-6-2.7-6-6v-12c0-3.3 2.7-6 6-6h12c3.3 0 6 2.7 6 6v12c0 3.3-2.7 6-6 6z" fill="#00adff" style="fill: rgb(22, 198, 12);"></path><path d="m9.9 15.2 9.2-9.2 1.4 1.4-10.6 10.6-6.4-6.4 1.4-1.4z" fill="#fff"></path></svg>' : '';
                    // Показываем первый запрос или сокращенную версию
                    const displayQuery = session.query.length > 30
                        ? session.query.substring(0, 30) + '...'
                        : session.query;

                    html += `<li>
                        ${statusClass} Запрос: ${displayQuery} ${session.status == 'running' ? '<svg  width="60" height="60" viewBox="0 0 38 38"><g transform="translate(19 19)"><g transform="rotate(0)"><circle cx="0" cy="12" r="3" fill="#60A5FA" opacity="0.125"><animate attributeName="opacity" from="0.125" to="0.125" dur="1.2s" begin="0s" repeatCount="indefinite" keyTimes="0;1" values="1;0.125"></animate></circle></g><g transform="rotate(45)"><circle cx="0" cy="12" r="3" fill="#60A5FA" opacity="0.25"><animate attributeName="opacity" from="0.25" to="0.25" dur="1.2s" begin="0.15s" repeatCount="indefinite" keyTimes="0;1" values="1;0.25"></animate></circle></g><g transform="rotate(90)"><circle cx="0" cy="12" r="3" fill="#60A5FA" opacity="0.375"><animate attributeName="opacity" from="0.375" to="0.375" dur="1.2s" begin="0.3s" repeatCount="indefinite" keyTimes="0;1" values="1;0.375"></animate></circle></g><g transform="rotate(135)"><circle cx="0" cy="12" r="3" fill="#60A5FA" opacity="0.5"><animate attributeName="opacity" from="0.5" to="0.5" dur="1.2s" begin="0.44999999999999996s" repeatCount="indefinite" keyTimes="0;1" values="1;0.5"></animate></circle></g><g transform="rotate(180)"><circle cx="0" cy="12" r="3" fill="#60A5FA" opacity="0.625"><animate attributeName="opacity" from="0.625" to="0.625" dur="1.2s" begin="0.6s" repeatCount="indefinite" keyTimes="0;1" values="1;0.625"></animate></circle></g><g transform="rotate(225)"><circle cx="0" cy="12" r="3" fill="#60A5FA" opacity="0.75"><animate attributeName="opacity" from="0.75" to="0.75" dur="1.2s" begin="0.75s" repeatCount="indefinite" keyTimes="0;1" values="1;0.75"></animate></circle></g><g transform="rotate(270)"><circle cx="0" cy="12" r="3" fill="#60A5FA" opacity="0.875"><animate attributeName="opacity" from="0.875" to="0.875" dur="1.2s" begin="0.8999999999999999s" repeatCount="indefinite" keyTimes="0;1" values="1;0.875"></animate></circle></g><g transform="rotate(315)"><circle cx="0" cy="12" r="3" fill="#60A5FA" opacity="1"><animate attributeName="opacity" from="1" to="1" dur="1.2s" begin="1.05s" repeatCount="indefinite" keyTimes="0;1" values="1;1"></animate></circle></g></g></svg>' : ''}
                        ${session.status === 'completed' ? `<button class="parser__button-save" onclick="downloadSession('${session.id}')">Скачать CSV <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-download" viewBox="0 0 16 16">
  <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
  <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z"/>
</svg></button>` : ''}
                    </li>`;
                });
                html += '</ul>';

                document.getElementById('sessions').innerHTML = html;

                // Обновляем счетчик активных сессий
                await checkActiveSessions();
            } catch (error) {
                console.error('Ошибка загрузки сессий:', error);
            }
        }

        function downloadSession(sessionId) {
            window.location.href = `/download-csv/${sessionId}`;
        }

        // Обновляем список сессий каждые 5 секунд
        setInterval(loadSessions, 5000);

        // Загружаем при старте
        loadSessions();
    </script>
</body>

</html>
